basePath: /api/v1
definitions:
  github_com_duydinhle_redis-sentinel-admin_internal_api.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_api_dto.HealthResponse:
    description: Service health status
    properties:
      status:
        example: ok
        type: string
      timestamp:
        type: string
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_sentinel.NodeInfo:
    properties:
      addr:
        type: string
      connected_clients:
        type: integer
      is_healthy:
        type: boolean
      role:
        description: '"master" | "replica" | "sentinel"'
        type: string
      uptime_seconds:
        type: integer
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_sentinel.TopologySnapshot:
    properties:
      captured_at:
        type: string
      master:
        $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_sentinel.NodeInfo'
      quorum_ok:
        type: boolean
      replicas:
        items:
          $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_sentinel.NodeInfo'
        type: array
      sentinels:
        items:
          $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_sentinel.NodeInfo'
        type: array
    type: object
host: localhost:8080
info:
  contact:
    name: Internal Infra Team
  description: Monitoring and operations API for Redis Sentinel clusters on Kubernetes.
  title: Redis Sentinel Admin API
  version: "1.0"
paths:
  /events/stream:
    get:
      description: 'Server-Sent Events stream of real-time Sentinel events (+sdown,
        -sdown, +odown, +failover-*). Connect and keep the connection open to receive
        events as they happen. Each event line is: `event: sentinel\ndata: {json}\n\n`.'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
      summary: Live Sentinel event stream
      tags:
      - events
  /healthz:
    get:
      description: Returns 200 OK when the process is alive. Used by Kubernetes liveness
        probe.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api_dto.HealthResponse'
              type: object
      summary: Liveness probe
      tags:
      - health
  /readyz:
    get:
      description: Returns 200 OK when the service can reach the Redis master via
        Sentinel. Used by Kubernetes readiness probe.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api_dto.HealthResponse'
              type: object
        "503":
          description: Master unreachable
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "504":
          description: Redis timeout
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
      summary: Readiness probe
      tags:
      - health
  /topology:
    get:
      description: Returns the current Master, Replica, and Sentinel node states including
        per-node health, connected clients, uptime, and quorum status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_sentinel.TopologySnapshot'
              type: object
        "502":
          description: No sentinel reachable
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "503":
          description: No master or quorum not met
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "504":
          description: Redis timeout
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
      summary: Get cluster topology
      tags:
      - topology
schemes:
- http
swagger: "2.0"
