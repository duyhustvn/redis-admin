basePath: /api/v1
definitions:
  github_com_duydinhle_redis-sentinel-admin_internal_api.APIError:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_api_dto.HealthResponse:
    description: Service health status
    properties:
      status:
        example: ok
        type: string
      timestamp:
        type: string
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_connection.ClientInfo:
    properties:
      conn_count:
        type: integer
      deployment:
        type: string
      max_idle_sec:
        type: integer
      max_qbuf_bytes:
        type: integer
      namespace:
        type: string
      pod_name:
        type: string
      source_addr:
        type: string
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_connection.NodeConnections:
    properties:
      clients:
        items:
          $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_connection.ClientInfo'
        type: array
      node_addr:
        type: string
      role:
        type: string
      throttled_pods:
        items:
          type: string
        type: array
      total:
        type: integer
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_connection.ReplicaDistribution:
    properties:
      node_addr:
        type: string
      overloaded:
        description: true when this replica carries >80% of total cluster reads
        type: boolean
      read_count:
        type: integer
      read_pct:
        type: number
      total_count:
        type: integer
      write_count:
        type: integer
      write_pct:
        type: number
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_diagnostics.MemoryReport:
    properties:
      aof_alert:
        description: true when last aof rewrite failed
        type: boolean
      aof_enabled:
        type: boolean
      aof_last_rewrite_status:
        type: string
      evicted_keys_per_sec:
        description: delta since last call
        type: number
      evicted_keys_total:
        type: integer
      eviction_policy:
        type: string
      frag_alert:
        description: true when frag_ratio > 1.5
        type: boolean
      frag_ratio:
        type: number
      max_memory_bytes:
        type: integer
      node_addr:
        type: string
      rdb_alert:
        description: true when last bgsave failed
        type: boolean
      rdb_changes_since_save:
        type: integer
      rdb_enabled:
        type: boolean
      rdb_last_bgsave_status:
        type: string
      rdb_last_save_time:
        type: integer
      role:
        type: string
      used_memory_bytes:
        type: integer
      used_memory_human:
        type: string
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_diagnostics.PipelineReport:
    properties:
      exec_abort_count:
        description: EXECABORT errors since node start
        type: integer
      max_input_buffer_bytes:
        description: client_recent_max_input_buffer
        type: integer
      node_addr:
        type: string
      oversized_pipelines:
        description: clients with qbuf > 1 MiB
        type: integer
      rejected_calls:
        description: commands rejected (errors/limits)
        type: integer
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_diagnostics.SlowlogEntry:
    properties:
      args:
        items:
          type: string
        type: array
      client_addr:
        type: string
      client_name:
        type: string
      duration_us:
        description: execution time in microseconds
        type: integer
      id:
        type: integer
      node_addr:
        type: string
      timestamp:
        type: string
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_keys.HotKeyReport:
    properties:
      frequency:
        description: OBJECT FREQ value
        type: integer
      key:
        type: string
      namespace:
        type: string
      node_addr:
        type: string
      type:
        type: string
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_keys.NamespaceTTLReport:
    properties:
      namespace:
        type: string
      no_ttl_alert:
        description: true when >50% of keys have no TTL
        type: boolean
      no_ttl_keys:
        type: integer
      no_ttl_pct:
        description: percentage of keys with no TTL
        type: number
      total_keys:
        type: integer
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_sentinel.NodeInfo:
    properties:
      addr:
        type: string
      connected_clients:
        type: integer
      is_healthy:
        type: boolean
      role:
        description: '"master" | "replica" | "sentinel"'
        type: string
      uptime_seconds:
        type: integer
    type: object
  github_com_duydinhle_redis-sentinel-admin_internal_sentinel.TopologySnapshot:
    properties:
      captured_at:
        type: string
      master:
        $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_sentinel.NodeInfo'
      quorum_ok:
        type: boolean
      replicas:
        items:
          $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_sentinel.NodeInfo'
        type: array
      sentinels:
        items:
          $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_sentinel.NodeInfo'
        type: array
    type: object
host: localhost:8080
info:
  contact:
    name: Internal Infra Team
  description: Monitoring and operations API for Redis Sentinel clusters on Kubernetes.
  title: Redis Sentinel Admin API
  version: "1.0"
paths:
  /connections:
    get:
      description: Runs CLIENT LIST on every Redis node, groups connections by source
        IP, and enriches each entry with Kubernetes Pod metadata (name, namespace,
        deployment) where available. Also reports which connected pods are CPU-throttled.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_connection.NodeConnections'
                  type: array
              type: object
        "502":
          description: No sentinel reachable
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "503":
          description: No master found
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "504":
          description: Redis timeout
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
      summary: List client connections per node
      tags:
      - connections
  /connections/distribution:
    get:
      description: Fetches INFO commandstats from every replica, classifies each command
        as read or write, and computes percentages. A replica is flagged as overloaded
        when it carries more than 80% of total cluster read traffic.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_connection.ReplicaDistribution'
                  type: array
              type: object
        "502":
          description: No sentinel reachable
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "503":
          description: No master found
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "504":
          description: Redis timeout
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
      summary: Read/write distribution per replica
      tags:
      - connections
  /diagnostics/memory:
    get:
      description: Returns memory fragmentation, eviction rate, and persistence health
        for every cluster node.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_diagnostics.MemoryReport'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  type: object
              type: object
      summary: Memory health report
      tags:
      - diagnostics
  /diagnostics/pipeline:
    get:
      description: Collects EXECABORT error counts, rejected_calls, maximum input
        buffer size, and oversized pipeline client counts (qbuf > 1 MiB) from every
        node.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_diagnostics.PipelineReport'
                  type: array
              type: object
        "502":
          description: No sentinel reachable
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "504":
          description: Redis timeout
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
      summary: Get pipeline and transaction stats per node
      tags:
      - diagnostics
  /diagnostics/slowlog:
    get:
      description: Pulls SLOWLOG GET from all nodes (master + replicas), aggregates
        entries, and returns them sorted by execution time descending. Use the limit
        parameter to control how many entries are returned.
      parameters:
      - default: 50
        description: Max entries to return (default 50, max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_diagnostics.SlowlogEntry'
                  type: array
              type: object
        "400":
          description: Invalid limit
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "502":
          description: No sentinel reachable
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "504":
          description: Redis timeout
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
      summary: Get slow commands across cluster
      tags:
      - diagnostics
  /events/stream:
    get:
      description: 'Server-Sent Events stream of real-time Sentinel events (+sdown,
        -sdown, +odown, +failover-*). Connect and keep the connection open to receive
        events as they happen. Each event line is: `event: sentinel\ndata: {json}\n\n`.'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
      summary: Live Sentinel event stream
      tags:
      - events
  /healthz:
    get:
      description: Returns 200 OK when the process is alive. Used by Kubernetes liveness
        probe.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api_dto.HealthResponse'
              type: object
      summary: Liveness probe
      tags:
      - health
  /keys/bigkeys:
    get:
      description: Streams big keys found via non-blocking SCAN as Server-Sent Events.
        Each event is a KeyReport JSON object. A final "summary" event contains per-namespace
        aggregates.
      parameters:
      - description: Minimum key size in bytes to report (default 1048576)
        in: query
        name: threshold_bytes
        type: integer
      produces:
      - text/event-stream
      responses:
        "200":
          description: stream of SSE events
          schema:
            type: string
      summary: Big key scanner (SSE)
      tags:
      - keys
  /keys/hotkeys:
    get:
      description: Returns the top-N keys by LFU access frequency. Requires maxmemory-policy
        to be an *-lfu variant.
      parameters:
      - description: Number of hot keys to return (default 20)
        in: query
        name: top
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_keys.HotKeyReport'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  type: object
              type: object
      summary: Hot key detector (LFU)
      tags:
      - keys
  /keys/ttl-report:
    get:
      description: Returns per-namespace percentage of keys without a TTL set.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_keys.NamespaceTTLReport'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  type: object
              type: object
      summary: TTL health report
      tags:
      - keys
  /readyz:
    get:
      description: Returns 200 OK when the service can reach the Redis master via
        Sentinel. Used by Kubernetes readiness probe.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api_dto.HealthResponse'
              type: object
        "503":
          description: Master unreachable
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "504":
          description: Redis timeout
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
      summary: Readiness probe
      tags:
      - health
  /topology:
    get:
      description: Returns the current Master, Replica, and Sentinel node states including
        per-node health, connected clients, uptime, and quorum status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_sentinel.TopologySnapshot'
              type: object
        "502":
          description: No sentinel reachable
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "503":
          description: No master or quorum not met
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
        "504":
          description: Redis timeout
          schema:
            allOf:
            - $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIResponse'
            - properties:
                error:
                  $ref: '#/definitions/github_com_duydinhle_redis-sentinel-admin_internal_api.APIError'
              type: object
      summary: Get cluster topology
      tags:
      - topology
schemes:
- http
swagger: "2.0"
